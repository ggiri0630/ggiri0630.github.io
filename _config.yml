title: 장꽐라의 꽐라일기 # your site title
author: Hyeng
email: hychang@dano.me
# email for form submission, you also have to change it in _js/scripts.js
description: > # this means to ignore newlines until "baseurl:"
    장꽐라의 인생을 서술한다.
baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://github.com/ggiri0630" # the base hostname & protocol for your site, e.g. http://example.com
social:
  name: Hyeyoung Chang
  links:
    - https://www.instagram.com/hyeng.ee

disqus:
  shortname: hyeng # to enable comments replace with your_disqus_shortname

# Build settings
markdown: kramdown
highlighter: rouge # or pygments or null
theme: jekyll-sleek
exclude:
  - README.md
  - node_modules
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - vendor
  - npm-debug.log
  - gulpfile.js
  - sleek.png

include: ['_pages']
permalink: /:title/

compress_html:
  clippings: all

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
